server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  large_client_header_buffers 8 32k;
  client_header_buffer_size 16k;
  client_max_body_size 25m;

  # Next.js export → URLs avec trailingSlash: true.
  # On sert le fichier exact, sinon on essaie le dossier (avec /index.html),
  # sinon 404 (et SPA fallback non applicable car export statique multi-pages).
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Cache long pour les assets buildés (hashés par Next)
  location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
